<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Proposal — Gray Content Studio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-bg: #faf8f4;
      --p-surface: #ffffff;
      --p-ink: #1c1a17;
      --p-muted: #6f6a62;
      --p-accent: #b5842e;
      --p-rule: rgba(28, 26, 23, 0.12);
      --p-dark: #0b0b0c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--p-bg);
      color: var(--p-ink);
      font-family: "Inter", -apple-system, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .sheet {
      max-width: 820px;
      margin: 2.5rem auto;
      background: var(--p-surface);
      border: 1px solid var(--p-rule);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(28, 26, 23, 0.08);
    }

    .p-head {
      background: var(--p-dark);
      color: #f5f2ec;
      padding: 3rem 3.2rem 2.6rem;
    }

    .p-wordmark {
      font-family: "Fraunces", serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .p-wordmark span { color: #d4a24e; }

    .p-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #d4a24e;
      margin-top: 2.4rem;
    }

    .p-head h1 {
      font-family: "Fraunces", serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 600;
      line-height: 1.12;
      margin-top: 0.5rem;
    }

    .p-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 2.2rem;
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: #9b968e;
    }

    .p-meta strong { color: #f5f2ec; font-weight: 500; display: block; }

    .p-body { padding: 2.6rem 3.2rem 3rem; }

    .p-notes {
      color: var(--p-muted);
      font-size: 0.98rem;
      max-width: 60ch;
      margin-bottom: 2.4rem;
    }

    .p-section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--p-accent);
      margin-bottom: 1rem;
    }

    table.items {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.93rem;
    }

    table.items th {
      text-align: left;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--p-muted);
      padding: 0.6rem 0.4rem;
      border-bottom: 2px solid var(--p-ink);
    }

    table.items th.num, table.items td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    table.items td {
      padding: 0.7rem 0.4rem;
      border-bottom: 1px solid var(--p-rule);
      vertical-align: top;
    }

    .item-cat {
      font-family: "Fraunces", serif;
      font-size: 1.02rem;
      font-weight: 600;
      padding-top: 1.4rem !important;
      border-bottom: none !important;
    }

    .item-unit { color: var(--p-muted); font-size: 0.8rem; display: block; }

    .totals-block {
      margin-top: 2rem;
      margin-left: auto;
      max-width: 340px;
      font-size: 0.95rem;
    }

    .t-row {
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 0.4rem 0.2rem;
      color: var(--p-muted);
      font-variant-numeric: tabular-nums;
    }

    .t-row span:last-child { color: var(--p-ink); }

    .t-row.grand {
      border-top: 2px solid var(--p-ink);
      margin-top: 0.6rem;
      padding-top: 0.8rem;
      font-weight: 600;
      color: var(--p-ink);
      font-size: 1.1rem;
    }

    .t-row.grand span:last-child {
      font-family: "Fraunces", serif;
      font-size: 1.45rem;
      color: var(--p-accent);
    }

    .pay-terms {
      margin-top: 2.6rem;
      background: var(--p-bg);
      border: 1px solid var(--p-rule);
      border-radius: 8px;
      padding: 1.5rem 1.8rem;
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
    }

    .pay-terms div strong {
      display: block;
      font-family: "Fraunces", serif;
      font-size: 1.3rem;
      margin-top: 0.2rem;
    }

    .pay-terms div span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--p-muted);
    }

    .p-foot {
      padding: 2rem 3.2rem 2.6rem;
      border-top: 1px solid var(--p-rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .p-foot .contact {
      font-size: 0.85rem;
      color: var(--p-muted);
    }

    .btn-print {
      font-family: "Inter", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: var(--p-dark);
      border: none;
      border-radius: 999px;
      padding: 0.85em 2em;
      cursor: pointer;
    }

    .btn-print:hover { background: #2a2a2e; }

    .invalid {
      max-width: 560px;
      margin: 18vh auto;
      text-align: center;
      padding: 2rem;
    }

    .invalid h1 { font-family: "Fraunces", serif; margin-bottom: 0.6rem; }
    .invalid p { color: var(--p-muted); }

    @media (max-width: 640px) {
      .p-head, .p-body, .p-foot { padding-inline: 1.4rem; }
      .sheet { margin: 0.8rem; }
      table.items th.unitprice, table.items td.unitprice { display: none; }
    }

    @media print {
      body { background: #fff; }
      .sheet {
        margin: 0;
        max-width: none;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      .btn-print { display: none; }
      .p-head { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      "use strict";

      window.addEventListener("hashchange", function () {
        location.reload();
      });

      function money(n) {
        return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }

      function decode(hash) {
        var b64 = hash.replace(/-/g, "+").replace(/_/g, "/");
        while (b64.length % 4) b64 += "=";
        return JSON.parse(decodeURIComponent(escape(atob(b64))));
      }

      var app = document.getElementById("app");
      var p = null;
      try {
        var h = location.hash.slice(1);
        if (h) p = decode(h);
      } catch (e) {
        p = null;
      }

      if (!p || !p.items || !p.items.length) {
        app.innerHTML =
          '<div class="invalid"><h1>Proposal not found</h1><p>This link appears to be incomplete or expired. Please contact Gray Content Studio for an updated proposal.</p></div>';
        return;
      }

      var byCat = {};
      p.items.forEach(function (i) {
        var cat = i.category || "Services";
        (byCat[cat] = byCat[cat] || []).push(i);
      });

      var rows = "";
      Object.keys(byCat).forEach(function (cat) {
        rows += '<tr><td class="item-cat" colspan="4">' + esc(cat) + "</td></tr>";
        byCat[cat].forEach(function (i) {
          rows +=
            "<tr><td>" + esc(i.name) + '<span class="item-unit">per ' + esc(i.unit) + "</span></td>" +
            '<td class="num unitprice">' + money(i.price) + "</td>" +
            '<td class="num">' + i.qty + "</td>" +
            '<td class="num">' + money(i.total) + "</td></tr>";
        });
      });

      var totals = '<div class="t-row"><span>Subtotal</span><span>' + money(p.subtotal) + "</span></div>";
      if (p.rushAmt > 0) {
        totals += '<div class="t-row"><span>' + esc(p.rushName) + " (+" + p.rushPct + "%)</span><span>" + money(p.rushAmt) + "</span></div>";
      }
      if (p.travelAmt > 0) {
        totals += '<div class="t-row"><span>Travel (' + p.miles + " mi)</span><span>" + money(p.travelAmt) + "</span></div>";
      }
      if (p.discountAmt > 0) {
        totals += '<div class="t-row"><span>Discount</span><span>−' + money(p.discountAmt) + "</span></div>";
      }
      totals += '<div class="t-row grand"><span>Total Investment</span><span>' + money(p.total) + "</span></div>";

      var meta = "";
      if (p.client || p.company) {
        meta += "<div><span>Prepared for</span><strong>" + esc(p.client || "") + (p.company ? " · " + esc(p.company) : "") + "</strong></div>";
      }
      if (p.created) meta += "<div><span>Date</span><strong>" + esc(p.created) + "</strong></div>";
      if (p.valid) meta += "<div><span>Valid until</span><strong>" + esc(p.valid) + "</strong></div>";

      app.innerHTML =
        '<div class="sheet">' +
        '<header class="p-head">' +
        '<div class="p-wordmark">Gray<span>·</span>Content<span>·</span>Studio</div>' +
        '<p class="p-eyebrow">Project Proposal</p>' +
        "<h1>" + esc(p.title || "Video Production Proposal") + "</h1>" +
        '<div class="p-meta">' + meta + "</div>" +
        "</header>" +
        '<div class="p-body">' +
        (p.notes ? '<p class="p-notes">' + esc(p.notes) + "</p>" : "") +
        '<p class="p-section-label">Included Services</p>' +
        '<table class="items"><thead><tr><th>Service</th><th class="num unitprice">Unit Price</th><th class="num">Qty</th><th class="num">Total</th></tr></thead><tbody>' +
        rows +
        "</tbody></table>" +
        '<div class="totals-block">' + totals + "</div>" +
        '<div class="pay-terms">' +
        "<div><span>Deposit to book (" + p.depositPct + "%)</span><strong>" + money(p.deposit) + "</strong></div>" +
        "<div><span>Balance on delivery</span><strong>" + money(p.balance) + "</strong></div>" +
        "</div>" +
        "</div>" +
        '<footer class="p-foot">' +
        '<p class="contact">Gray Content Studio — Video Production · Editing · Animation</p>' +
        '<button class="btn-print" onclick="window.print()">Download PDF</button>' +
        "</footer>" +
        "</div>";

      if (p.title) document.title = esc(p.title) + " — Gray Content Studio";
    })();
  </script>
</body>
</html>
